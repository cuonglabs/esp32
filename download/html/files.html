<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cuonglabs.github.io/esp32/download/css/style.css">
</head>
<body>
    <div id="sidebar"></div>
    <div class="main">
        <h1>%DEVICE_NAME%</h1>
        <div class="explorer">
            <div class="sidebar-tree">
                <ul id="tree"></ul>
            </div>
            <div class="content">
                <div class="toolbar">
                    <button onclick="goBack()">⬅ Back</button>
                    <button onclick="createFolder()">📁 New Folder</button>
                    <button onclick="refresh()">🔄 Refresh</button>
                    <input type="text" id="searchBox" placeholder="Search..." onkeyup="searchFiles()">
                </div>
                <div id="pathBar" class="breadcrumb">/</div>
                <table id="fileTable">
                    <thead>
                        <tr>
                            <th onclick="sortBy('name')">Name</th>
                            <th onclick="sortBy('type')">Type</th>
                            <th onclick="sortBy('size')">Size</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
                <div class="status-bar">
                    <span id="statusText">0 items</span>
                </div>
            </div>
        </div>
        <div id="contextMenu"></div>
    </div>
    <script src="https://cuonglabs.github.io/esp32/download/js/nav.js"></script>
    <script src="https://cuonglabs.github.io/esp32/download/js/file.js"></script>
</body>
</html>
